syntax = "proto3";

package agent.v1;

option go_package = "peregrine/gen/agent/v1;agentv1";

service AgentService {
  rpc Ping(PingRequest) returns (PingResponse) {}
  rpc StartUltrathink(UltrathinkRequest) returns (UltrathinkResponse) {}
  rpc StartUltraplan(UltraplanRequest) returns (UltraplanResponse) {}
  rpc DispatchAction(ActionRequest) returns (ActionResponse) {}
  rpc QuickSearch(SearchRequest) returns (SearchResponse) {}
}

message PingRequest {
  string id = 1;
}
message PingResponse {
  string message = 1;
}

message UltrathinkRequest {
  string id = 1;
}
message UltrathinkResponse {
  string result = 1;
}

message UltraplanRequest {
  string id = 1;
}
message UltraplanResponse {
  string result = 1;
}

message ActionRequest {
  string id = 1;
  string action = 2;
}
message ActionResponse {
  string result = 1;
}

message SearchRequest {
  string id = 1;
  string query = 2;
}
message SearchResponse {
  string result = 1;
}
