name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test-and-build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v26
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Build Flake (Frontend + Backend)
        run: nix build .#default --print-build-logs

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.1'
          
      - name: Setup Gleam & Erlang
        uses: erlef/setup-beam@v1
        with:
          otp-version: "27.1.2"
          gleam-version: "1.9.0"
          rebar3-version: "3"

      - name: Test Gleam Backend
        run: |
          cd peregrine_backend
          gleam deps download
          gleam test
          gleam format --check src test

      - name: Test Go Frontend
        run: |
          cd peregrine_frontend
          go mod tidy
          go test -v ./...
          go build -o peregrine_cli

      - name: Verify Binary Output
        run: |
          if [ ! -f ./result/bin/peregrine ]; then
            echo "Nix build failed to produce the executable"
            exit 1
          fi
          ./result/bin/peregrine -h || echo "Binary exists and is executable"
