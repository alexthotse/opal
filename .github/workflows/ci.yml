name: CI

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:

jobs:
  test-and-build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v26
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Setup Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x

      - name: Build Flake (Frontend, Backend, and OCI Container)
        run: |
          task default || true
          task build:container || true

      - name: Test Gleam Backend
        run: task test:falcon

      - name: Test Go Frontend
        run: task test:peregrine

      - name: Check Formatting
        run: |
          nix develop .#default -c bash -c "cd falcon && gleam format --check src test"
          nix develop .#default -c bash -c "cd peregrine && test -z \"\$(gofmt -l .)\""

  release:
    needs: test-and-build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v26
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Build Final Binary
        run: nix build .#default

      - name: Tarball Artifact
        run: |
          tar -czvf peregrine-${{ github.ref_name }}-linux-amd64.tar.gz -C result/bin peregrine

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            peregrine-${{ github.ref_name }}-linux-amd64.tar.gz
          generate_release_notes: true

      - name: Build Docker Container via Nix
        run: |
          nix build .#container
          
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to GHCR
        run: |
          # Load the Nix-built OCI container into docker daemon
          docker load < result
          
          IMAGE_NAME="ghcr.io/${{ github.repository }}"
          
          # The nix dockerTools defaults the tag to 'latest'. We will retag it.
          docker tag ghcr.io/alexthotse/peregrine:latest $IMAGE_NAME:${{ github.ref_name }}
          docker tag ghcr.io/alexthotse/peregrine:latest $IMAGE_NAME:latest
          
          # Push both the version tag and the latest tag
          docker push $IMAGE_NAME:${{ github.ref_name }}
          docker push $IMAGE_NAME:latest
          echo "GHCR pushing completed successfully"
