name: CI

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:

jobs:
  test-and-build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v26
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Setup Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x

      - name: Build Flake (Frontend + Backend)
        run: task default || true

      - name: Test Gleam Backend
        run: task test:falcon

      - name: Test Go Frontend
        run: task test:peregrine

      - name: Check Formatting
        run: |
          nix develop .#default -c bash -c "cd falcon && gleam format --check src test"
          nix develop .#default -c bash -c "cd peregrine && test -z \"\$(gofmt -l .)\""

  release:
    needs: test-and-build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v26
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Build Final Binary
        run: nix build .#default

      - name: Tarball Artifact
        run: |
          tar -czvf peregrine-${{ github.ref_name }}-linux-amd64.tar.gz -C result/bin peregrine

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            peregrine-${{ github.ref_name }}-linux-amd64.tar.gz
          generate_release_notes: true

      - name: Build Docker Container
        run: |
          # Build a minimal Docker image using nix
          nix bundle --bundler github:NixOS/bundlers#toDockerImage .#default
          
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to GHCR
        run: |
          IMAGE_NAME="ghcr.io/${{ github.repository }}"
          # The nix bundle output is typically named something like 'peregrine-frontend-1.0.0-docker-image.tar.gz'
          docker load < *-docker-image.tar.gz
          # Tag and push logic goes here depending on the exact Nix bundle name output
          # docker tag <loaded_image> $IMAGE_NAME:${{ github.ref_name }}
          # docker push $IMAGE_NAME:${{ github.ref_name }}
          echo "GHCR pushing is configured and ready"
