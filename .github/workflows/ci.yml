name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test-and-build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v26
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Setup Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x

      - name: Build Flake (Frontend + Backend)
        run: task default

      - name: Test Gleam Backend
        run: task test:falcon

      - name: Test Go Frontend
        run: task test:peregrine

      - name: Check Formatting
        run: |
          nix develop .#default -c bash -c "cd falcon && gleam format --check src test"
          nix develop .#default -c bash -c "cd peregrine && test -z \"\$(gofmt -l .)\""

      - name: Verify Binary Output
        run: |
          if [ ! -f ./result/bin/peregrine ]; then
            echo "Nix build failed to produce the executable"
            exit 1
          fi
          ./result/bin/peregrine -h || echo "Binary exists and is executable"
