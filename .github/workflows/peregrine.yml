name: Peregrine CI/CD

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:

jobs:
  lint-and-test:
    name: Lint & Test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v26
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Setup Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x

      - name: Check Formatting
        run: |
          nix develop .#default -c bash -c "cd falcon && gleam format --check src test"
          nix develop .#default -c bash -c "cd peregrine && test -z \"\$(gofmt -l .)\""

      - name: Run Unit Tests
        run: task test

  build:
    name: Build Artifacts
    needs: lint-and-test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v26
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Setup Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x

      - name: Build Falcon Backend (Gleam)
        run: task build:falcon

      - name: Build Peregrine Frontend (Go)
        run: task default

      - name: Verify Binary Exists
        run: |
          if [ ! -f ./result/bin/peregrine ]; then
            echo "Nix build failed to produce the executable"
            exit 1
          fi
          ./result/bin/peregrine -h || echo "Binary exists and is executable"

      - name: Build OCI Container (Alpine Linux Base)
        # OCI builds natively on Linux. Avoid macOS Nix cross-compilation quirks for Docker outputs.
        if: runner.os == 'Linux'
        run: task build:container

  release:
    name: Publish Release & Container
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v26
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Setup Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x

      - name: Build Native Linux Binary
        run: task default

      - name: Tarball Artifact
        run: |
          tar -czvf peregrine-${{ github.ref_name }}-linux-amd64.tar.gz -C result/bin peregrine

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: peregrine-${{ github.ref_name }}-linux-amd64.tar.gz
          generate_release_notes: true

      - name: Build OCI Container Image
        run: task build:container

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to GHCR
        run: |
          # Load the Nix-built OCI container into docker daemon
          docker load < result
          
          IMAGE_NAME="ghcr.io/${{ github.repository }}"
          
          # The nix dockerTools defaults the tag to 'latest'. We will retag it with the explicit version.
          docker tag ghcr.io/alexthotse/peregrine:latest $IMAGE_NAME:${{ github.ref_name }}
          docker tag ghcr.io/alexthotse/peregrine:latest $IMAGE_NAME:latest
          
          # Push both the version tag and the latest tag
          docker push $IMAGE_NAME:${{ github.ref_name }}
          docker push $IMAGE_NAME:latest
          echo "GHCR pushing completed successfully"
